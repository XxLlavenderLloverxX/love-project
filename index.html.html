<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Reveal</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        
        /* Interactive Question Styles */
        #quiz-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #000; z-index: 100; color: #ff3399; text-align: center; padding: 20px;
            box-sizing: border-box;
        }

        .btn-container { margin-top: 30px; display: flex; gap: 20px; align-items: center; justify-content: center; width: 100%; position: relative; }

        #yes-btn {
            background: #ff3399; border: none; color: white;
            padding: 10px 25px; font-size: 1.2rem; cursor: pointer;
            border-radius: 50px; font-weight: bold; transition: all 0.2s;
            z-index: 101;
        }

        #no-btn {
            background: none; border: 2px solid #ff3399; color: #ff3399;
            padding: 10px 25px; font-size: 1.2rem; cursor: pointer;
            border-radius: 50px; transition: all 0.2s;
        }

        .sad-emoji { position: absolute; color: #555; font-size: 1rem; pointer-events: none; }

        #music-container {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; z-index: 50; display: none;
        }
    </style>
</head>
<body>

    <div id="quiz-overlay">
        <h2 id="question">Do you promise to stay with me forever?</h2>
        <div class="btn-container" id="container">
            <button id="yes-btn" onclick="startApp()">YES</button>
            <button id="no-btn" onclick="sayNo()">NO</button>
        </div>
    </div>

    <div id="music-container">
        <iframe style="border-radius:12px" 
            src="https://open.spotify.com/embed/track/06KEMb8epziEMkjowgPA1k?utm_source=generator&theme=0" 
            width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
    </div>

    <canvas id="matrix"></canvas>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const quizOverlay = document.getElementById('quiz-overlay');
        
        let yesSize = 1.2;
        const sadEmojis = ["(┬┬﹏┬┬)", "o(TヘTo)", " (╥﹏╥) ", " (っ °Д °;)っ "];

        function sayNo() {
            // Make YES button bigger
            yesSize += 0.4;
            yesBtn.style.transform = `scale(${yesSize})`;
            
            // Move NO button to a random spot
            const x = Math.random() * (window.innerWidth - 100);
            const y = Math.random() * (window.innerHeight - 50);
            noBtn.style.position = 'fixed';
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';

            // Add a sad emoji floating nearby
            const emoji = document.createElement('div');
            emoji.className = 'sad-emoji';
            emoji.innerText = sadEmojis[Math.floor(Math.random() * sadEmojis.length)];
            emoji.style.left = (Math.random() * 80 + 10) + '%';
            emoji.style.top = (Math.random() * 80 + 10) + '%';
            document.body.appendChild(emoji);
            
            // Remove emoji after a bit to keep it clean
            setTimeout(() => emoji.remove(), 2000);
        }

        // --- MATRIX ANIMATION LOGIC ---
        let started = false;
        const letters = "HAPPYBIRTHDAY";
        const fontSize = 16;
        let columns, drops;
        let frameCount = 0;
        const rainSlowdown = 2; 
        const messageDuration = 150; 
        const messages = ["3", "2", "1", "HAPPY", "BIRTHDAY", "TO", "YOU", "❤️"];
        let state = 0;
        let stateTimer = 0;

        function initMatrix() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            columns = Math.floor(canvas.width / fontSize);
            drops = new Array(columns).fill(1);
        }

        function startApp() {
            quizOverlay.style.display = 'none';
            document.getElementById('music-container').style.display = "block";
            started = true;
            initMatrix();
            draw();
        }

        function draw() {
            if (!started) return;

            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (frameCount % rainSlowdown === 0) {
                ctx.font = fontSize + "px monospace";
                for (let i = 0; i < drops.length; i++) {
                    const text = letters.charAt(Math.floor(Math.random() * letters.length));
                    ctx.fillStyle = (Math.random() > 0.9) ? "#ffb3d9" : "#660033";
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                    drops[i]++;
                }
            }

            const currentText = messages[state];
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff3399";
            ctx.fillStyle = "#ffffff";
            let displaySize = canvas.width / (currentText.length > 3 ? 7 : 4);
            ctx.font = `bold ${displaySize}px monospace`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(currentText, canvas.width / 2, canvas.height / 2);
            ctx.shadowBlur = 0;

            stateTimer++;
            if (stateTimer > messageDuration && state < messages.length - 1) {
                stateTimer = 0;
                state++;
            }

            frameCount++;
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', initMatrix);
    </script>
</body>
</html>
