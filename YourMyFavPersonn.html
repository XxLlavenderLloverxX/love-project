<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For My Favorite Person</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000; /* Pitch Black */
            font-family: 'Courier New', Courier, monospace; 
            touch-action: manipulation;
        }

        /* --- Landing Page --- */
        #landing-page {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            z-index: 999;
            transition: opacity 0.5s ease;
        }

        h1 {
            color: #ff2e8c; /* Bubbly Pink */
            font-size: 1.8rem;
            text-align: center;
            padding: 0 20px;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .btn-container {
            position: relative;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            text-transform: uppercase;
            z-index: 1000;
            transition: all 0.1s ease;
        }

        #yes-btn {
            background-color: #ff2e8c;
            color: white;
            border: none;
        }

        #no-btn {
            background-color: transparent;
            color: #ff2e8c;
            border: 2px solid #ff2e8c; 
        }

        /* --- Animation Container --- */
        #animation-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .falling-item {
            position: absolute;
            top: -200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fall linear forwards;
            z-index: 10;
        }

        .falling-item span {
            color: #ff2e8c;
            font-size: 22px;
            font-weight: 800;
            text-align: center;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 46, 140, 0.5);
        }

        .falling-item img {
            width: 100px;
            height: 130px;
            object-fit: cover;
            border-radius: 10px;
            border: 2px solid white;
            margin-top: 10px;
        }

        @keyframes fall {
            0% { transform: translateY(0); opacity: 0; }
            5% { opacity: 1; }
            95% { opacity: 1; }
            100% { transform: translateY(120vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop preload="auto">
        <source src="https://www.dropbox.com/scl/fi/0up85o3k4x6kb3qlh4jh9/Nightcore-Hometown-Smile-NightcoreGalaxy-f6169af33a02c8169e78385d2ecf403b.m4a?rlkey=5cpjykno935zlehe1wy5zo0qs&st=g057gtk8&raw=1" type="audio/mp4">
    </audio>

    <div id="landing-page">
        <h1>Wanna see how much you mean to me?</h1>
        <div class="btn-container">
            <button id="yes-btn" class="btn">YES :D</button>
            <button id="no-btn" class="btn">NO :c</button>
        </div>
    </div>

    <div id="animation-container"></div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const landing = document.getElementById('landing-page');
        const container = document.getElementById('animation-container');
        const music = document.getElementById('bgMusic');

        const messages = [
            "I love you so much<3",
            "Thank you for being my everything i swear<@_@>",
            "Every day with you feels like magic (｡♥‿♥｡)",
            "You make my heart smile^^",
            "No words could ever capture how much you mean to me (´▽`ʃ♡ƪ)",
            "You are really amazingg(≧∇≦)ﾉ",
            "noone could ever replace you(¬_¬)",
            "My favorite person hehe",
            "You're my universe(づ￣ 3￣)づ"
        ];

        const imageUrls = [
            "https://i.postimg.cc/v8CNPWzN/image.jpg",
            "https://i.postimg.cc/rpg1vkL1/Cutesy-cat.jpg"
        ];

        // 1. "No" Button Escape Logic
        function moveNo() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = "fixed";
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }

        noBtn.addEventListener('mouseover', moveNo);
        noBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            moveNo();
        });

        // 2. Transition Logic (Plays Music + Starts Animation)
        yesBtn.addEventListener('click', () => {
            music.volume = 0.6;
            music.play().catch(e => console.log("Audio play blocked - waiting for interaction"));

            landing.style.opacity = '0';
            setTimeout(() => {
                landing.style.display = 'none';
                startHearts();
            }, 500);
        });

        // 3. Falling Animation Logic
        function spawnItem() {
            const item = document.createElement('div');
            item.className = 'falling-item';
            const xPos = Math.random() * (window.innerWidth - 150);
            const duration = 3 + Math.random() * 3;

            item.style.left = xPos + "px";
            item.style.animationDuration = duration + "s";

            const rand = Math.random();
            let content = `<span>${messages[Math.floor(Math.random() * messages.length)]}</span>`;
            
            if (rand > 0.6) {
                const img = imageUrls[Math.floor(Math.random() * imageUrls.length)];
                content += `<img src="${img}">`;
            }

            item.innerHTML = content;
            container.appendChild(item);

            setTimeout(() => { item.remove(); }, duration * 1000);
        }

        function startHearts() {
            setInterval(spawnItem, 350);
        }
    </script>
</body>
</html>
